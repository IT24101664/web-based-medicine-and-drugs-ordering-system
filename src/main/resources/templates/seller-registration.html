<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Registration - MediCare+ | Professional</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">

    <style>
        /* --- Custom CSS for Glassmorphism Theme --- */

        :root {
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #475569;
            --brand-color: #4f46e5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            position: relative;
        }

        /* Light overlay to improve text readability */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(241, 245, 249, 0.4);
            z-index: -1;
        }

        .registration-container {
            width: 100%;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Glassmorphic Registration Card */
        .registration-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 750px;
            transition: transform 0.3s ease;
        }

        .registration-title {
            color: var(--text-main);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* Section Titles */
        .section-title {
            font-weight: 700;
            color: var(--text-main);
            font-size: 1.15rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Form Inputs */
        .form-label {
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            font-size: 0.95rem;
        }

        .form-control {
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid #e2e8f0;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background-color: #ffffff;
            border-color: var(--brand-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .input-group-text {
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
        }

        textarea.form-control {
            border-radius: 0.75rem;
        }

        /* Register Button */
        .btn-primary-custom {
            background-color: var(--brand-color);
            color: white;
            padding: 0.9rem;
            border-radius: 0.75rem;
            border: none;
            transition: all 0.3s ease;
            font-size: 1.05rem;
        }

        .btn-primary-custom:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(79, 70, 229, 0.3);
            color: white;
        }

        /* Links styling */
        .links {
            text-align: center;
            font-size: 0.95rem;
        }

        .brand-link {
            color: var(--brand-color);
            transition: color 0.2s ease;
        }

        .brand-link:hover {
            color: #312e81;
            text-decoration: underline !important;
        }

        /* Customizing Thymeleaf injected alerts */
        .alert {
            border-radius: 10px;
            border: none;
            font-weight: 500;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="registration-container">
    <div class="registration-card">

        <!-- Header -->
        <div class="text-center mb-4 pb-2">
            <h2 class="registration-title mb-2">
                <i class="bi bi-shop text-primary me-2"></i>Seller Registration
            </h2>
            <p class="text-muted">Join MediCare+ and start selling your products.</p>
        </div>

        <!-- Thymeleaf Error Alert (Fixed: Added strict check to prevent showing an empty alert bar) -->
        <div th:if="${error != null and error != ''}" class="alert alert-danger shadow-sm mb-4">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        </div>

        <!-- Thymeleaf Form -->
        <form th:action="@{/seller/registration}" method="post" th:object="${seller}">

            <!-- Account Details Section -->
            <h5 class="section-title"><i class="bi bi-person-badge text-secondary"></i> Account Details</h5>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label for="name" class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="name" th:field="*{name}" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-at"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="username" th:field="*{username}" placeholder="johndoe123" required>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control border-start-0 ps-0" id="email" th:field="*{email}" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="Create password" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="phoneNumber" class="form-label">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-telephone"></i></span>
                    <input type="tel" class="form-control border-start-0 ps-0" id="phoneNumber" th:field="*{phoneNumber}" placeholder="07XXXXXXXX">
                </div>
            </div>

            <div class="mb-4">
                <label for="address" class="form-label">Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-geo-alt"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" id="address" th:field="*{address}" placeholder="Your full address">
                </div>
            </div>

            <hr class="my-4 border-secondary border-opacity-25">

            <!-- Store Information Section -->
            <h5 class="section-title"><i class="bi bi-building text-secondary"></i> Store Information</h5>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label for="storeName" class="form-label">Store Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-shop-window"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="storeName" th:field="*{storeName}" placeholder="e.g. City Pharmacy" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="licenseNumber" class="form-label">License Number</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-card-heading"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="licenseNumber" th:field="*{licenseNumber}" placeholder="e.g. PHR-12345">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="specialization" class="form-label">Specialization</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-star"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" id="specialization" th:field="*{specialization}" placeholder="e.g., Ayurvedic, General Pharmacy">
                </div>
            </div>

            <div class="mb-4">
                <label for="storeDescription" class="form-label">Store Description</label>
                <textarea class="form-control px-3" id="storeDescription" rows="3" th:field="*{storeDescription}" placeholder="Briefly describe your store and products..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 fw-bold mt-2">
                Register as Seller <i class="bi bi-arrow-right-circle ms-1"></i>
            </button>
        </form>

        <!-- Links Section -->
        <div class="links mt-4 pt-3 border-top border-secondary border-opacity-25">
            <p class="mb-0 text-muted">
                Already have an account?
                <a href="/login" class="text-decoration-none fw-semibold brand-link">Login here</a>
            </p>
        </div>

    </div>
</div>

</body>
</html>
