<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediCare+ | Professional</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- Custom CSS for Glassmorphism Theme --- */

        :root {
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #475569;
            --brand-color: #4f46e5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Light overlay to improve text readability */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(241, 245, 249, 0.4);
            z-index: -1;
        }

        .login-container {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Glassmorphic Login Card */
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .login-title {
            color: var(--text-main);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* Form Inputs */
        .form-label {
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            font-size: 0.95rem;
        }

        .form-control {
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid #e2e8f0;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background-color: #ffffff;
            border-color: var(--brand-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .input-group-text {
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
        }

        /* Login Button */
        .btn-primary-custom {
            background-color: var(--brand-color);
            color: white;
            padding: 0.8rem;
            border-radius: 0.75rem;
            border: none;
            transition: all 0.3s ease;
            font-size: 1.05rem;
        }

        .btn-primary-custom:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(79, 70, 229, 0.3);
            color: white;
        }

        /* Links styling */
        .links {
            text-align: center;
            font-size: 0.95rem;
        }

        .brand-link {
            color: var(--brand-color);
            transition: color 0.2s ease;
        }

        .brand-link:hover {
            color: #312e81;
            text-decoration: underline !important;
        }

        /* Customizing injected alerts */
        .alert {
            border-radius: 10px;
            border: none;
            font-weight: 500;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <!-- Header -->
        <div class="text-center mb-4">
            <h2 class="login-title mb-2">
                <i class="bi bi-heart-pulse-fill text-danger me-2"></i>MediCare+
            </h2>
            <p class="text-muted">Welcome back! Please login to your account.</p>
        </div>

        <!-- Alert Container (Handled by JS) -->
        <div id="alert-container" class="mb-3"></div>

        <!-- Login Form -->
        <form action="/login" method="post">

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 fw-bold">
                Login <i class="bi bi-box-arrow-in-right ms-1"></i>
            </button>

        </form>

        <!-- Links Section -->
        <div class="links mt-4 pt-3 border-top border-secondary border-opacity-25">
            <p class="mb-2 text-muted">
                New to MediCare+?
                <a href="/register" class="text-decoration-none fw-semibold brand-link">Register as a Customer</a>
            </p>
            <p class="mb-0 text-muted">
                Want to sell with us?
                <a href="/seller/registration" class="text-decoration-none fw-semibold brand-link">Register as a Seller</a>
            </p>
        </div>

    </div>
</div>

<script>
    // Original JavaScript kept completely intact
    document.addEventListener("DOMContentLoaded", function() {
        const params = new URLSearchParams(window.location.search);
        const alertContainer = document.getElementById('alert-container');

        if (params.has('error')) {
            alertContainer.innerHTML = '<div class="alert alert-danger shadow-sm"><i class="bi bi-exclamation-circle-fill me-2"></i>Invalid username or password.</div>';
        } else if (params.has('logout')) {
            alertContainer.innerHTML = '<div class="alert alert-success shadow-sm"><i class="bi bi-check-circle-fill me-2"></i>You have been logged out successfully.</div>';
        } else if (params.has('success')) {
            alertContainer.innerHTML = '<div class="alert alert-success shadow-sm"><i class="bi bi-check-circle-fill me-2"></i>Registration successful! Please log in.</div>';
        }
    });
</script>
</body>
</html>
