<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Professional</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- Custom CSS for Glassmorphism & Background Image --- */

        :root {
            /* Translucent white for glass effect */
            --card-bg: rgba(255, 255, 255, 0.75);
            --text-main: #0f172a;        /* Dark slate text */
            --text-muted: #475569;       /* Slate muted text */
            --brand-color: #4f46e5;      /* Modern Indigo color */
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Premium abstract background image from Unsplash */
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            padding-bottom: 3rem;
            position: relative;
        }

        /* Subtle dark overlay to improve text contrast on light/bright screens */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(241, 245, 249, 0.4); /* Very light overlay */
            z-index: -1;
        }

        /* Top Header Styling with Glassmorphism */
        .dashboard-header {
            background: var(--card-bg);
            backdrop-filter: blur(16px); /* Blur effect for the glass look */
            -webkit-backdrop-filter: blur(16px);
            padding: 2rem;
            border-radius: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.5); /* Semi-transparent border */
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
            margin-top: 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .header-titles h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
            color: var(--text-main);
        }

        .header-titles p.subtitle {
            color: var(--text-muted);
            margin: 0;
            font-weight: 500;
        }

        /* Action Buttons Styling */
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-custom {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.6rem 1.2rem;
            font-weight: 500;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-primary-custom {
            background-color: var(--brand-color);
            color: white;
        }
        .btn-primary-custom:hover { background-color: #4338ca; color: white;}

        .btn-warning-custom {
            background-color: #f59e0b;
            color: white;
        }
        .btn-warning-custom:hover { background-color: #d97706; color: white;}

        .btn-danger-custom {
            background-color: #ef4444;
            color: white;
        }
        .btn-danger-custom:hover { background-color: #dc2626; color: white;}

        /* Stats Grid Styling */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        /* Glassmorphic Card Styling */
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px;
            border-radius: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            display: flex;
            align-items: center;
            gap: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.85); /* Becomes slightly more solid on hover */
        }

        /* Icon Container styling */
        .icon-wrapper {
            width: 70px;
            height: 70px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        /* Semi-transparent icon backgrounds */
        .icon-blue { background: rgba(224, 231, 255, 0.7); color: #4f46e5; }
        .icon-green { background: rgba(220, 252, 227, 0.7); color: #16a34a; }
        .icon-orange { background: rgba(255, 237, 213, 0.7); color: #ea580c; }

        .stat-card .info h3 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
            color: var(--text-main);
        }

        .stat-card .info p {
            color: var(--text-muted);
            margin: 5px 0 0 0;
            font-size: 1rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container-xl">

    <!-- Header Section -->
    <div class="dashboard-header">
        <div class="header-titles">
            <h1>Admin Dashboard</h1>
            <p class="subtitle">System Overview & Management</p>
        </div>
        <div class="header-actions">
            <a href="product-admin.html" class="btn btn-custom btn-primary-custom">
                <i class="bi bi-box-seam-fill"></i> Manage Products
            </a>
            <a href="admin-usermanagement.html" class="btn btn-custom btn-primary-custom">
                <i class="bi bi-people-fill"></i> Manage Users
            </a>
            <a href="admin-expiryalerts.html" class="btn btn-custom btn-warning-custom">
                <i class="bi bi-hourglass-split"></i> Expiry Alerts
            </a>
            <a href="/logout" class="btn btn-custom btn-danger-custom">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </div>

    <!-- Stats Grid Section -->
    <div class="stats-grid" id="statsGrid">
        <div class="w-100 text-center text-muted py-5" id="loadingState">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Loading statistics...</p>
        </div>
    </div>

</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        $.ajax({
            url: '/api/admin/dashboard/stats',
            method: 'GET',
            success: function(stats) {
                renderCards(stats.totalUsers, stats.totalProducts, stats.pendingAlerts);
            },
            error: function() {
                console.log("API not found, loading sample data for preview.");
                renderCards('1,248', '342', '12');
            }
        });
    });

    function renderCards(users, products, alerts) {
        const grid = $('#statsGrid');
        grid.empty();
        grid.append(createStatCard('Total Users', users, 'bi-people-fill', 'icon-blue'));
        grid.append(createStatCard('Total Products', products, 'bi-box-seam-fill', 'icon-green'));
        grid.append(createStatCard('Pending Alerts', alerts, 'bi-exclamation-triangle-fill', 'icon-orange'));
    }

    function createStatCard(title, value, iconClass, colorClass) {
        return `
            <div class="stat-card">
                <div class="icon-wrapper ${colorClass}">
                    <i class="bi ${iconClass}"></i>
                </div>
                <div class="info">
                    <h3>${value}</h3>
                    <p>${title}</p>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
