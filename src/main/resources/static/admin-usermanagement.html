<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management | Professional</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- Custom CSS matching the Dashboard Theme --- */

        :root {
            --card-bg: rgba(255, 255, 255, 0.75);
            --text-main: #0f172a;
            --text-muted: #475569;
            --brand-color: #4f46e5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            padding-bottom: 3rem;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(241, 245, 249, 0.4);
            z-index: -1;
        }

        /* Top Header Styling with Glassmorphism */
        .dashboard-header {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 2rem;
            border-radius: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
            margin-top: 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .header-titles h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
            color: var(--text-main);
        }

        .header-titles p.subtitle {
            color: var(--text-muted);
            margin: 0;
            font-weight: 500;
        }

        /* Action Buttons */
        .btn-custom {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.6rem 1.2rem;
            font-weight: 500;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-primary-custom {
            background-color: var(--brand-color);
            color: white;
        }
        .btn-primary-custom:hover { background-color: #4338ca; color: white;}

        /* Glassmorphic Table Card */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 1.5rem;
            border-radius: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        /* Custom Table Styling to fit the glass look */
        .table-glass {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-main);
            margin-bottom: 0;
            vertical-align: middle;
        }

        .table-glass thead th {
            background-color: rgba(255, 255, 255, 0.4);
            border-bottom: 2px solid rgba(255, 255, 255, 0.6);
            color: var(--text-main);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            padding: 1rem;
        }

        .table-glass tbody td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .table-glass tbody tr {
            transition: background-color 0.2s ease;
        }

        .table-glass tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.6);
        }

        /* Small action buttons in table */
        .btn-sm-custom {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            border-radius: 0.4rem;
            font-weight: 500;
        }

        /* Custom Badges */
        .badge-role-admin {
            background-color: var(--brand-color);
            color: white;
            padding: 0.5em 0.8em;
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .badge-role-user {
            background-color: #10b981; /* Emerald green */
            color: white;
            padding: 0.5em 0.8em;
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

    </style>
</head>
<body>

<div class="container-xl">

    <!-- Header Section -->
    <div class="dashboard-header">
        <div class="header-titles">
            <h1>User Management</h1>
            <p class="subtitle">View and manage system users</p>
        </div>
        <div class="header-actions">
            <a href="admin-dashboard.html" class="btn btn-custom btn-primary-custom">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>

    <!-- Table Section -->
    <div class="glass-card">
        <div class="table-responsive">
            <table class="table table-glass">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody id="usersTableBody">
                <!-- Loading state, will be replaced by JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        fetchUsers();
    });

    function fetchUsers() {
        $.ajax({
            url: '/api/admin/users',
            method: 'GET',
            success: function(users) {
                const tableBody = $('#usersTableBody');
                tableBody.empty();

                if(users.length === 0) {
                    tableBody.html('<tr><td colspan="6" class="text-center text-muted py-4">No users found.</td></tr>');
                    return;
                }

                users.forEach(user => {
                    const isAdmin = user.userType.toUpperCase() === 'ADMIN';

                    // Assign beautiful badges based on role
                    const badgeClass = isAdmin ? 'badge-role-admin' : 'badge-role-user';

                    // Modern styled buttons
                    const deleteButton = isAdmin
                        ? `<button class="btn btn-sm btn-secondary btn-sm-custom" disabled><i class="bi bi-shield-lock-fill"></i> Protected</button>`
                        : `<button class="btn btn-sm btn-danger btn-sm-custom" onclick="deleteUser('${user.username}')"><i class="bi bi-trash-fill"></i> Delete</button>`;

                    tableBody.append(`
                        <tr>
                            <td class="fw-bold text-muted">#${user.id}</td>
                            <td class="fw-semibold">${user.name}</td>
                            <td>@${user.username}</td>
                            <td>${user.email}</td>
                            <td><span class="badge ${badgeClass}">${user.userType}</span></td>
                            <td class="text-end">${deleteButton}</td>
                        </tr>
                    `);
                });
            },
            error: function() {
                // Mock data strictly for Previewing the UI if Backend is not connected
                console.log("Loading mock data for preview...");
                const tableBody = $('#usersTableBody');
                tableBody.empty();

                const mockUsers = [
                    { id: 1, name: 'System Admin', username: 'admin', email: 'admin@system.com', userType: 'ADMIN' },
                    { id: 2, name: 'John Doe', username: 'johndoe', email: 'john@example.com', userType: 'USER' },
                    { id: 3, name: 'Jane Smith', username: 'janesmith', email: 'jane@example.com', userType: 'USER' }
                ];

                mockUsers.forEach(user => {
                    const isAdmin = user.userType.toUpperCase() === 'ADMIN';
                    const badgeClass = isAdmin ? 'badge-role-admin' : 'badge-role-user';
                    const deleteButton = isAdmin
                        ? `<button class="btn btn-sm btn-secondary btn-sm-custom" disabled><i class="bi bi-shield-lock-fill"></i> Protected</button>`
                        : `<button class="btn btn-sm btn-danger btn-sm-custom" onclick="deleteUser('${user.username}')"><i class="bi bi-trash-fill"></i> Delete</button>`;

                    tableBody.append(`
                        <tr>
                            <td class="fw-bold text-muted">#${user.id}</td>
                            <td class="fw-semibold">${user.name}</td>
                            <td>@${user.username}</td>
                            <td>${user.email}</td>
                            <td><span class="badge ${badgeClass}">${user.userType}</span></td>
                            <td class="text-end">${deleteButton}</td>
                        </tr>
                    `);
                });
            }
        });
    }

    // Your exact original JavaScript action for deleteUser
    function deleteUser(username) {
        if (!confirm(`Are you sure you want to delete user: ${username}?`)) {
            return;
        }
        $.ajax({
            url: `/api/admin/users/${username}`,
            method: 'DELETE',
            success: function(response) {
                alert(response);
                fetchUsers();
            },
            error: function(xhr) {
                alert(`Error: ${xhr.responseText}`);
            }
        });
    }
</script>
</body>
</html>
